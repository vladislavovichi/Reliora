services:
  ai-service:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile
    command: ["sh", "/app/ops/docker/entrypoint.sh"]
    environment:
      PYTHONPATH: /app/src
      AI_SERVICE__HOST: ai-service
      AI_SERVICE__PORT: 50061
      RUN_MIGRATIONS: "false"
      SERVICE_MODULE: ai_service.main
    env_file:
      - ../../.env
    healthcheck:
      test: ["CMD", "python", "-m", "ai_service.healthcheck"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    ports:
      - "${AI_SERVICE_EXPOSE_PORT:-50081}:50061"
    restart: unless-stopped
    volumes:
      - ../..:/app

  backend:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile
    command: ["sh", "/app/ops/docker/entrypoint.sh"]
    environment:
      PYTHONPATH: /app/src
      DATABASE__HOST: postgres
      DATABASE__PORT: 5432
      REDIS__HOST: redis
      REDIS__PORT: 6379
      BACKEND_SERVICE__PORT: 50051
      AI_SERVICE__HOST: ai-service
      AI_SERVICE__PORT: 50061
      RUN_MIGRATIONS: "true"
      SERVICE_MODULE: backend.main
    env_file:
      - ../../.env
    depends_on:
      ai-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "backend.healthcheck"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    ports:
      - "${BACKEND_EXPOSE_PORT:-50071}:50051"
    restart: unless-stopped
    volumes:
      - ../..:/app

  bot:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile
    command: ["sh", "/app/ops/docker/entrypoint.sh"]
    environment:
      PYTHONPATH: /app/src
      DATABASE__HOST: postgres
      DATABASE__PORT: 5432
      REDIS__HOST: redis
      REDIS__PORT: 6379
      BACKEND_SERVICE__HOST: backend
      BACKEND_SERVICE__PORT: 50051
      RUN_MIGRATIONS: "false"
      SERVICE_MODULE: app.main
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "app.healthcheck"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    volumes:
      - ../..:/app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DATABASE__DATABASE:-helpdesk}
      POSTGRES_USER: ${DATABASE__USER:-helpdesk}
      POSTGRES_PASSWORD: ${DATABASE__PASSWORD:-helpdesk}
    ports:
      - "${POSTGRES_EXPOSE_PORT:-5434}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE__USER:-helpdesk} -d ${DATABASE__DATABASE:-helpdesk}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_EXPOSE_PORT:-6381}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
