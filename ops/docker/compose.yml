name: reliora

services:
  ai-service:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile
      args:
        POETRY_INSTALL_ARGS: "--only main,local-ai"
    command: ["sh", "/app/ops/docker/entrypoint.sh"]
    environment:
      PYTHONPATH: /app/src
      APP__ENVIRONMENT: ${APP__ENVIRONMENT:-prod}
      DATABASE_URL: ""
      REDIS_URL: ""
      AI_SERVICE__HOST: ai-service
      AI_SERVICE__PORT: 50061
      AI_SERVICE__LISTEN_HOST: 0.0.0.0
      AI__MODEL_ID: ${AI__MODEL_ID:-Qwen/Qwen2.5-0.5B-Instruct}
      AI__LOCAL_MODEL_PATH: ${AI__LOCAL_MODEL_PATH:-}
      AI__LOCAL_CACHE_DIR: /cache/huggingface
      AI__LOCAL_TORCH_CACHE_DIR: /cache/torch
      AI__LOCAL_TORCH_KERNEL_CACHE_DIR: /cache/torch_kernels
      AI__LOCAL_DEVICE: ${AI__LOCAL_DEVICE:-auto}
      AI__LOCAL_DTYPE: ${AI__LOCAL_DTYPE:-auto}
      AI__LOCAL_MAX_INPUT_TOKENS: ${AI__LOCAL_MAX_INPUT_TOKENS:-4096}
      AI__LOCAL_MAX_CONCURRENT_REQUESTS: ${AI__LOCAL_MAX_CONCURRENT_REQUESTS:-1}
      AI__LOCAL_TOP_P: ${AI__LOCAL_TOP_P:-0.9}
      AI__LOCAL_REPETITION_PENALTY: ${AI__LOCAL_REPETITION_PENALTY:-1.05}
      AI__LOCAL_TRUST_REMOTE_CODE: ${AI__LOCAL_TRUST_REMOTE_CODE:-false}
      RUN_MIGRATIONS: "false"
      SERVICE_MODULE: ai_service.main
    env_file:
      - ${RELIORA_ENV_FILE:-../../.env.local}
    init: true
    healthcheck:
      test: ["CMD", "python", "-m", "ai_service.healthcheck"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: ${AI_SERVICE_HEALTH_START_PERIOD:-180s}
    networks:
      - helpdesk
    ports:
      - "${AI_SERVICE_EXPOSE_PORT:-50081}:50061"
    volumes:
      - ../../models:/models:ro
      - ai-huggingface-cache:/cache/huggingface
      - ai-torch-cache:/cache/torch
      - ai-torch-kernels-cache:/cache/torch_kernels
    restart: unless-stopped
    stop_grace_period: 20s

  backend:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile
    command: ["sh", "/app/ops/docker/entrypoint.sh"]
    environment:
      PYTHONPATH: /app/src
      APP__ENVIRONMENT: ${APP__ENVIRONMENT:-prod}
      DATABASE_URL: ""
      REDIS_URL: ""
      DATABASE__HOST: postgres
      DATABASE__PORT: 5432
      REDIS__HOST: redis
      REDIS__PORT: 6379
      BACKEND_SERVICE__HOST: backend
      BACKEND_SERVICE__PORT: 50051
      BACKEND_SERVICE__LISTEN_HOST: 0.0.0.0
      AI_SERVICE__HOST: ai-service
      AI_SERVICE__PORT: 50061
      RUN_MIGRATIONS: "true"
      SERVICE_MODULE: backend.main
    env_file:
      - ${RELIORA_ENV_FILE:-../../.env.local}
    init: true
    depends_on:
      ai-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "backend.healthcheck"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - helpdesk
    ports:
      - "${BACKEND_EXPOSE_PORT:-50071}:50051"
    restart: unless-stopped
    stop_grace_period: 20s

  bot:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile
    command: ["sh", "/app/ops/docker/entrypoint.sh"]
    environment:
      PYTHONPATH: /app/src
      APP__ENVIRONMENT: ${APP__ENVIRONMENT:-prod}
      DATABASE_URL: ""
      REDIS_URL: ""
      DATABASE__HOST: postgres
      DATABASE__PORT: 5432
      REDIS__HOST: redis
      REDIS__PORT: 6379
      BACKEND_SERVICE__HOST: backend
      BACKEND_SERVICE__PORT: 50051
      RUN_MIGRATIONS: "false"
      SERVICE_MODULE: app.main
    env_file:
      - ${RELIORA_ENV_FILE:-../../.env.local}
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "app.healthcheck"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 35s
    networks:
      - helpdesk
    restart: unless-stopped
    stop_grace_period: 25s

  mini-app:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile
    command: ["sh", "/app/ops/docker/entrypoint.sh"]
    environment:
      PYTHONPATH: /app/src
      APP__ENVIRONMENT: ${APP__ENVIRONMENT:-prod}
      DATABASE_URL: ""
      REDIS_URL: ""
      BACKEND_SERVICE__HOST: backend
      BACKEND_SERVICE__PORT: 50051
      MINI_APP__LISTEN_HOST: 0.0.0.0
      MINI_APP__PORT: 8080
      RUN_MIGRATIONS: "false"
      SERVICE_MODULE: mini_app.main
    env_file:
      - ${RELIORA_ENV_FILE:-../../.env.local}
    init: true
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "mini_app.healthcheck"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - helpdesk
    ports:
      - "${MINI_APP_EXPOSE_PORT:-8088}:8080"
    restart: unless-stopped
    stop_grace_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DATABASE__DATABASE:-helpdesk}
      POSTGRES_USER: ${DATABASE__USER:-helpdesk}
      POSTGRES_PASSWORD: ${DATABASE__PASSWORD:-helpdesk}
      PGDATA: /var/lib/postgresql/data/pgdata
    init: true
    ports:
      - "${POSTGRES_EXPOSE_PORT:-5434}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE__USER:-helpdesk} -d ${DATABASE__DATABASE:-helpdesk}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - helpdesk
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    init: true
    ports:
      - "${REDIS_EXPOSE_PORT:-6381}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - helpdesk
    restart: unless-stopped
    volumes:
      - redis_data:/data

networks:
  helpdesk:
    name: reliora-network

volumes:
  postgres_data:
  redis_data:
  ai-huggingface-cache:
  ai-torch-cache:
  ai-torch-kernels-cache:
