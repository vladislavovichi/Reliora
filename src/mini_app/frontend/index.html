<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"
    />
    <title>Reliora · Рабочее место</title>
    <meta name="theme-color" content="#ede7dc" />
    <link rel="stylesheet" href="/assets/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">Reliora</p>
          <h1>Рабочее место</h1>
          <p class="subtitle">
            Спокойное рабочее пространство для операторов и суперадминистраторов.
          </p>
        </div>
        <div class="identity-card" id="identity-card">
          <p class="identity-label">Сеанс</p>
          <strong id="identity-name">Подключение…</strong>
          <span id="identity-role">Проверяем доступ</span>
        </div>
      </header>

      <nav class="nav-strip" id="nav-strip"></nav>
      <div class="shell-notice" id="app-notice" hidden></div>

      <main class="content" id="content">
        <section class="loading-state">
          <div class="loading-line loading-line-wide"></div>
          <div class="loading-line"></div>
          <div class="loading-grid">
            <div class="loading-card"></div>
            <div class="loading-card"></div>
            <div class="loading-card"></div>
          </div>
        </section>
      </main>
    </div>

    <template id="empty-state-template">
      <section class="empty-state">
        <p class="eyebrow">Спокойно</p>
        <h2>Данных пока нет</h2>
        <p class="subtitle"></p>
      </section>
    </template>

    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
