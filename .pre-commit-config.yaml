repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: env POETRY_VIRTUALENVS_IN_PROJECT=true PYTHONPATH=src poetry run mypy src tests
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: env POETRY_VIRTUALENVS_IN_PROJECT=true PYTHONPATH=src poetry run pytest
        language: system
        pass_filenames: false
